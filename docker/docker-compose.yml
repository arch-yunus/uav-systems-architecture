version: '3.8'

services:
  # Sovereign UAV Development Environment
  uav_dev_env:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sovereign_uav_dev
    volumes:
      - .:/sovereign_ws/src/uav_systems_architecture
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true

  # Simulation Environment (SITL)
  uav_sitl_sim:
    image: osrf/ros:humble-desktop-full
    container_name: sovereign_uav_sim
    command: /bin/bash -c "source /opt/ros/humble/setup.bash && ros2 launch uav_systems_architecture sovereign_launch.py"
    network_mode: host
    volumes:
      - .:/sovereign_ws/src/uav_systems_architecture
    depends_on:
      - uav_dev_env
